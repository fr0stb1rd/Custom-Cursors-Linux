<!DOCTYPE html>

        content="Convert Windows .ani cursors to Linux themes. Universal support for GNOME, KDE, XFCE (X11 & Wayland) with instant installation scripts.">
    <link rel="canonical" href="https://cursorport.01blue.org/documentation.html" />

    <!-- 
        LIBRARIES (Same as index.html for consistency)
    -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        miku: { DEFAULT: '#39C5BB', 50: '#F0FDFA', 100: '#CCFBF1', 400: '#2DD4BF', 500: '#14B8A6', 900: '#134E4A' },
                        teto: { DEFAULT: '#D03E5C', 50: '#FFF1F2', 100: '#FFE4E6', 400: '#FB7185', 500: '#F43F5E', 900: '#881337' },
                        neru: { DEFAULT: '#F2C911', 400: '#FACC15', 500: '#EAB308' }
                    },
                    fontFamily: { sans: ['Inter', 'sans-serif'], mono: ['JetBrains Mono', 'monospace'] },
                    animation: { 'fade-in': 'fadeIn 0.5s ease-out forwards' },
                    keyframes: { fadeIn: { '0%': { opacity: '0', transform: 'translateY(10px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } } }
                }
            }
        }
    </script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<body>
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- ICONS ---
        const Icon = ({ children, className = "" }) => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
                {children}
            </svg>
        );
        const ArrowLeft = (p) => <Icon {...p}><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></Icon>;
        const Code = (p) => <Icon {...p}><polyline points="16 18 22 12 16 6"></polyline><polyline points="8 6 2 12 8 18"></polyline></Icon>;
        const Image = (p) => <Icon {...p}><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></Icon>;
        const MousePointer = (p) => <Icon {...p}><path d="M3 3l7.07 16.97 2.51-7.39 7.39-2.51L3 3z"></path><path d="M13 13l6 6"></path></Icon>;
        const Sun = (p) => <Icon {...p}><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></Icon>;
        const Moon = (p) => <Icon {...p}><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></Icon>;
        const Settings = (p) => <Icon {...p}><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></Icon>;
        const Info = (p) => <Icon {...p}><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></Icon>;
        const Terminal = (p) => <Icon {...p}><polyline points="4 17 10 11 4 5"></polyline><line x1="12" y1="19" x2="20" y2="19"></line></Icon>;
        const Zap = (p) => <Icon {...p}><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon></Icon>;

        // --- DOCUMENTATION APP ---
        // Simple read-only page to display credits and stack info
        const App = () => {
            // Theme State (synced with localStorage)
            // Initialize DIRECTLY from localStorage to prevent white flash
            const [isDark, setIsDark] = useState(() => {
                const savedTheme = localStorage.getItem('theme');
                // Check if 'theme' exists; if not, default to true
                const initialDark = savedTheme ? savedTheme === 'dark' : true;
                // Apply class immediately to prevent FOUC (Flash Of Unstyled Content)
                document.documentElement.classList.toggle('dark', initialDark);
                return initialDark;
            });
            const [isTransitioning, setIsTransitioning] = useState(false);

            // Sync with localStorage
            useEffect(() => {
                // Ensure the root element has the correct class immediately
                document.documentElement.classList.toggle('dark', isDark);
                localStorage.setItem('theme', isDark ? 'dark' : 'light');

                // Optional: Listen for storage events to sync across tabs in real-time
                const handleStorageChange = () => {
                    const savedTheme = localStorage.getItem('theme');
                    if (savedTheme) setIsDark(savedTheme === 'dark');
                };
                window.addEventListener('storage', handleStorageChange);
                return () => window.removeEventListener('storage', handleStorageChange);
            }, [isDark]);

            const toggleTheme = () => {
                setIsTransitioning(true);
                setTimeout(() => {
                    setIsDark(!isDark);
                    setIsTransitioning(false);
                }, 300);
            };

            return (
                <div className={isDark ? 'dark' : ''}>
                    <div className={`transition-colors duration-700 min-h-screen ${isDark ? 'bg-[#020617]' : 'bg-teto-50'}`}>

                        <div className={`fixed inset-0 bg-neru pointer-events-none z-[100] transition-opacity duration-300 ${isTransitioning ? 'opacity-20' : 'opacity-0'}`}></div>

                            {/* NAVIGATION */}

                                <a href="./" className="flex items-center gap-3 px-6 py-3 rounded-full bg-white/80 dark:bg-slate-900/80 backdrop-blur-md shadow-xl hover:scale-105 transition-all group border border-slate-100 dark:border-slate-800">
                                    <ArrowLeft className="w-5 h-5 text-black dark:text-white group-hover:text-teto dark:group-hover:text-miku transition-colors" />
                                    <span className="text-xs font-black tracking-widest text-black dark:text-white dark:text-slate-200">RETURN TO APP</span>
                                </a>

                                    <div className="hidden md:block text-[10px] font-bold text-black dark:text-white uppercase tracking-[0.2em]">Documentation & Credits</div>

                                    <button
                                        onClick={toggleTheme}
                                        className={`
                                            relative overflow-hidden group flex items-center justify-center w-10 h-10 rounded-full border 
                                            transition-all duration-500
                                            ${isDark
                                                ? 'bg-slate-800 border-slate-700 hover:border-neru hover:shadow-[0_0_15px_rgba(242,201,17,0.3)]'
                                                : 'bg-white border-slate-200 hover:border-neru hover:shadow-[0_0_15px_rgba(242,201,17,0.3)]'
                                            }
                                        `}
                                    >
                                        <div className="absolute inset-0 bg-neru opacity-0 group-hover:opacity-10 transition-opacity duration-300"></div>

                                        <div className={`absolute transition-all duration-500 transform ${isDark ? 'opacity-0 rotate-90 scale-50' : 'opacity-100 rotate-0 scale-100'}`}>
                                            <Sun size={18} className="text-teto group-hover:text-neru transition-colors duration-300" />
                                        </div>

                                        <div className={`absolute transition-all duration-500 transform ${isDark ? 'opacity-100 rotate-0 scale-100' : 'opacity-0 -rotate-90 scale-50'}`}>
                                            <Moon size={18} className="text-miku group-hover:text-neru transition-colors duration-300" />
                                        </div>
                                    </button>
                                </div>

                                            </div>

                                            <p>
                                                Linux cursor themes rely on a specific directory structure in <code className="bg-slate-100 dark:bg-slate-800 px-1 rounded">~/.local/share/icons/</code>.
                                                Unlike Windows which uses a settings menu to pick individual files, Linux uses <strong>Hard Links</strong> or <strong>Symlinks</strong> to map standard names (like <code className="text-teto dark:text-miku">left_ptr</code>) to your custom graphics.
                                            </p>
                                            <div className="p-6 rounded-2xl bg-slate-50 dark:bg-black/20 border border-slate-100 dark:border-slate-800">

                                                        <span><strong>Acquire:</strong> Get your favorite Windows cursor set (often from sites like DeviantArt or Ko-fi) in <code className="text-xs">.ani</code> or <code className="text-xs">.cur</code> format.</span>
                                                    </li>
                                                    <li className="flex gap-3">
                                                        <span className="flex-shrink-0 w-6 h-6 rounded-full bg-teto dark:bg-miku text-white dark:text-slate-900 flex items-center justify-center text-[10px] font-bold">2</span>
                                                        <span><strong>Convert:</strong> Original files are converted to Linux native XCursor formats using <code className="text-teto dark:text-miku">win2xcur</code>.</span>
                                                    </li>
                                                    <li className="flex gap-3">
                                                        <span className="flex-shrink-0 w-6 h-6 rounded-full bg-teto dark:bg-miku text-white dark:text-slate-900 flex items-center justify-center text-[10px] font-bold">3</span>
                                                        <span><strong>Organize:</strong> Converted files are placed in a <code className="text-xs">/cursors</code> folder within your Linux theme directory.</span>

                                                    </li>

                                                </div>

                                            {/* NERU CREDIT */}
                                            <a href="https://fanloid.fandom.com/wiki/Akita_Neru" target="_blank" rel="noopener noreferrer" className="block p-4 rounded-2xl bg-white dark:bg-slate-900/50 border border-slate-100 dark:border-slate-800/50 backdrop-blur-sm hover:scale-[1.02] hover:shadow-lg hover:shadow-neru/20 transition-all group/card">
